services:

  car_service1:
    build:
      context: ./car_rest_api
    image: car_service_img:latest
    container_name: car_service1
    ports:
      - 8081:8080
    networks:
      - load_balancer_network
  
  car_service2:
    build:
      context: ./car_rest_api
    image: car_service_img:latest
    container_name: car_service2
    ports:
      - 8082:8080
    networks:
      - load_balancer_network
  
  car_service3:
    build:
      context: ./car_rest_api
    image: car_service_img:latest
    container_name: car_service3
    ports:
      - 8083:8080
    networks:
      - load_balancer_network

  nginx:
    image: nginx:latest
    container_name: nginx_load_balancer
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - car_service1
      - car_service2
      - car_service3
    networks:
      - load_balancer_network

networks:
  load_balancer_network: