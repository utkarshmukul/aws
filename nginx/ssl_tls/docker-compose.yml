services:

  car_service:
    build:
      context: ./car_rest_api
    image: car_service_img:latest
    container_name: car_service
    ports:
      - 8080:8080
    networks:
      - ssl_tls_network

  bike_service:
    build:
      context: ./bike_rest_api
    image: bike_service_img:latest
    container_name: bike_service
    ports:
      - 8081:8081
    networks:
      - http_network
  
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - 443:443
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - car_service
      - bike_service
    networks:
      - ssl_tls_network
      - http_network

networks:
  ssl_tls_network:
  http_network: