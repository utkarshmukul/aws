services:

  car_service:
    build:
      context: ./car_rest_api
    image: car_service_img:latest
    container_name: car_service
    ports:
      - 8080:8080
    networks:
      - ssl_tls_network
  
  nginx:
    image: nginx:latest
    container_name: nginx_load_balancer
    ports:
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - car_service
    networks:
      - ssl_tls_network

networks:
  ssl_tls_network: