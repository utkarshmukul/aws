version: '3.9'

services:

  car_service:
    build:
      context: ./car_rest_api
    image: car_service_img:latest
    container_name: car_service
    ports:
      - 8080:8080
    networks:
      - reverse_proxy_network

  bike_service:
    build:
      context: ./bike_rest_api
    image: bike_service_img:latest
    container_name: bike_service
    ports:
      - 8081:8081
    networks:
      - reverse_proxy_network

  nginx:
    image: nginx:latest
    container_name: nginx_reverse_proxy
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - car_service
      - bike_service
    networks:
      - reverse_proxy_network

networks:
  reverse_proxy_network: